<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tu Tiên Lộ - Bí Cảnh Ẩn Thế</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div id="game-outer">
        <div id="game-container">
            <div class="header">
                <h1 style="color: var(--gold); margin: 0;">TU TIÊN LỘ</h1>
                <p>Bản: Bí Cảnh Ẩn Thế</p>
                <p id="player-banner"></p>
            </div>

            <div id="setup-screen">
                <div id="char-setup" class="char-setup"
                    style="background:#25252b;padding:18px;border-radius:10px;margin-bottom:20px;text-align:left;border:1px solid #333;">
                    <h3 class="highlight" style="margin:0 0 14px 0;text-align:center;">Khởi tạo đạo hữu</h3>
                    <label class="form-label" for="pc-name">Tên hiển thị <span style="color:var(--red)">*</span></label>
                    <input id="pc-name" type="text" maxlength="16" placeholder="Ví dụ: Tiêu Dao" autocomplete="nickname" />
                    <label class="form-label" for="pc-gender">Giới tính</label>
                    <select id="pc-gender">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Ẩn danh">Không tiết lộ</option>
                    </select>
                    <label class="form-label" for="pc-dao-hieu">Đạo hiệu (tuỳ chọn)</label>
                    <input id="pc-dao-hieu" type="text" maxlength="24" placeholder="Ví dụ: Nhất Niệm Thanh Phong" />
                    <label class="form-label" for="pc-origin">Xuất thân</label>
                    <select id="pc-origin">
                        <option value="dan">Thôn dân (bình thường)</option>
                        <option value="thu">Thư hương (+2 Ngộ tính khi xuất phát)</option>
                        <option value="vo">Võ lâm hậu nhân (+15 thọ ban đầu)</option>
                    </select>
                </div>

                <div id="trait-display"
                    style="background:#25252b; padding:20px; border-radius:10px; margin-bottom:20px; border:1px dashed var(--gold);">
                    <h3 id="init-lc" class="highlight">Linh Căn: ???</h3>
                    <h3 id="init-wisdom" class="wisdom">Ngộ Tính: ???</h3>
                    <h3 id="init-kv" style="color:var(--purple)">Khí Vận: ???</h3>
                </div>

                <button onclick="rollFate()" style="background:var(--green); width:100%;">Gieo Quẻ (Ngẫu Nhiên)</button>
                <button id="start-btn" onclick="startGame()"
                    style="display:none; width:100%; background:var(--blue); margin-top:10px;">Bắt Đầu Luân Hồi</button>

                <p id="save-hint"></p>
                <button id="btn-continue" type="button" class="btn-continue" onclick="loadGameFromStorage()"
                    style="display:none; width:100%; margin-top:10px;">Tiếp tục</button>
                <button type="button" class="btn-save" onclick="saveGameToStorage(false)"
                    style="width:100%; margin-top:10px;">💾 Lưu tiến trình (màn hình này)</button>

                <button onclick="godMode()" class="btn-cheat">⚡ Nghịch Thiên ⚡</button>
            </div>

            <div id="play-screen" style="display:none;">
                <div class="stats-grid">
                    <div class="stat-item" style="grid-column: 1 / -1;">
                        <span class="stat-label">Đạo hữu</span>
                        <span id="pc-play-line" class="highlight">--</span>
                    </div>
                    <div class="stat-item"><span class="stat-label">Cảnh Giới</span><span id="rank-txt"
                            class="highlight">--</span></div>
                    <div class="stat-item"><span class="stat-label">Linh Lực</span><span id="mana-txt">0</span> / <span
                            id="max-mana-txt">--</span></div>
                    <div class="stat-item"><span class="stat-label">Linh Căn</span><span id="lc-txt">--</span></div>
                    <div class="stat-item"><span class="stat-label">Ngộ Tính</span><span id="wisdom-txt"
                            class="wisdom">--</span></div>
                    <div class="stat-item"><span class="stat-label">Thọ Nguyên</span><span id="age-txt">--</span> /
                        <span id="max-age-txt">--</span>
                    </div>
                    <div class="stat-item"><span class="stat-label">Khí Vận</span><span id="kv-txt"
                            style="color:var(--purple)">--</span></div>
                    <div class="stat-item" style="grid-column: 1 / -1;">
                        <span class="stat-label">Lượt hành động (hồi 1 / 2 phút)</span>
                        <span id="charge-summary-line" style="color:#aaa;font-size:0.9em;">--</span>
                    </div>
                </div>
                <div id="log" class="log-box"></div>
                <div class="action-grid">
                    <button id="btn-train" type="button" onclick="train()">Tu Luyện</button>
                    <button id="btn-explore" type="button" onclick="explore()">Tìm Kỳ Ngộ</button>
                    <button type="button" class="btn-save" onclick="saveGameToStorage(false)">💾 Lưu</button>
                    <button type="button" class="btn-delete-save" onclick="deleteSaveConfirm()">Xóa lưu</button>
                    <button id="break-btn" class="btn-major" onclick="handleBreakthrough()"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="faction-modal" class="faction-modal">
        <div class="faction-modal-content">
            <h3 class="highlight" style="margin: 0 0 8px 0;">Kì Ngộ Xuất Hiện</h3>
            <p style="margin: 0;">Cơ duyên đã tới. Ngươi muốn chọn con đường nào?</p>
            <div class="faction-modal-actions">
                <button onclick="selectFactionByButton('CHINH')" style="background:var(--blue);">Gia nhập Chính Đạo</button>
                <button onclick="selectFactionByButton('MA')" style="background:var(--red);">Bước vào Ma Đạo</button>
                <button onclick="selectFactionByButton('NONE')">Giữ thân Tản Tu</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
